# npmjs publish workflow
name: Publish npm package

on:
  workflow_dispatch:
  push:
    branches:
      - marketplace
    paths:
      - src/**
      - package.json
      - package-lock.json

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    if: github.ref_name == 'marketplace'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Resolve release
        id: release
        run: |
          set -euo pipefail

          message="$(git log -1 --pretty=%B)"
          if printf '%s\n' "$message" | grep -qE '^chore\(release\):'; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "bump=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          should_publish="true"
          bump=""
          if printf '%s\n' "$message" | grep -qE '(^((feat|fix|perf|refactor|docs|style|test|chore|ci|build|revert)(\([^)]+\))?!):|BREAKING CHANGE:)'; then
            bump="major"
          elif printf '%s\n' "$message" | grep -qE '^feat(\([^)]+\))?:'; then
            bump="minor"
          elif printf '%s\n' "$message" | grep -qE '^(fix|perf)(\([^)]+\))?:|^chore\(deps\):'; then
            bump="patch"
          else
            should_publish="false"
          fi

          echo "should_publish=${should_publish}" >> "$GITHUB_OUTPUT"
          echo "bump=${bump:-none}" >> "$GITHUB_OUTPUT"

      - name: Bump package version
        if: steps.release.outputs.should_publish == 'true' && steps.release.outputs.bump != 'none'
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          npm version "${{ steps.release.outputs.bump }}" -m "chore(release): publish types v%s [skip ci]"
          git push --follow-tags

      - name: Build package
        if: steps.release.outputs.should_publish == 'true'
        run: npm run build --if-present

      - name: Publish package
        if: steps.release.outputs.should_publish == 'true'
        run: npm publish --access public
