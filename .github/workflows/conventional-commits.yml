name: Conventional Commits

on:
  workflow_dispatch:
  push: {}
  pull_request: {}

permissions:
  contents: read

jobs:
  lint-commits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate commit messages
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_BEFORE: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            range="${PR_BASE_SHA}..${PR_HEAD_SHA}"
          elif [[ -n "${PUSH_BEFORE}" && ! "${PUSH_BEFORE}" =~ ^0+$ ]]; then
            range="${PUSH_BEFORE}..${HEAD_SHA}"
          else
            range="${HEAD_SHA}^..${HEAD_SHA}"
          fi

          pattern='^(feat|fix|perf|refactor|docs|style|test|chore|ci|build|revert)(\([A-Za-z0-9._/-]+\))?!?: .+'
          failed=0

          while read -r sha; do
            subject="$(git log -1 --format=%s "${sha}")"
            if [[ "${subject}" == Merge\ * ]]; then
              continue
            fi
            if [[ ! "${subject}" =~ ${pattern} ]]; then
              echo "::error title=Invalid commit message::${sha:0:7} ${subject}"
              failed=1
            fi
          done < <(git rev-list --no-merges "${range}")

          if [[ "${failed}" -ne 0 ]]; then
            cat >&2 <<'EOF'
          Commit messages must follow Conventional Commits:
            <type>(optional-scope): <description>

          Allowed types:
            feat, fix, perf, refactor, docs, style, test, chore, ci, build, revert

          Examples:
            fix(runtime): recover stuck custom source batches
            docs(runtime): document data source plugin policies
            ci(devourer): skip docs-only builds
          EOF
            exit 1
          fi
